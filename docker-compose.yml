version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/crop_recommendation
      - SECRET_KEY=your-secret-key-here
    depends_on:
      - db
    volumes:
      - ./backend:/app
    networks:
      - crop-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - crop-network

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=crop_recommendation
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crop-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - crop-network

volumes:
  postgres_data:

networks:
  crop-network:
    driver: bridge
